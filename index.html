<!DOCTYPE html>
<html>

<head>
    <link rel="icon"
        href="https://www.vhv.rs/dpng/d/410-4101831_weight-scale-png-picture-weight-scale-png-transparent.png"
        type="image/png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <title>WeightTracker</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        div {
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="submit"] {
            width: 100%;
            padding: 60px;
            font-size: 70px;
        }

        .weightEntry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            border: 2px solid #ddd;
            margin-bottom: 10px;
            font-size: 40px;
        }

        .weightValue {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .weightValue span {
            cursor: pointer;
            padding: 10px 0;
        }

        .date {
            font-size: 30px !important;
            color: #666;
        }

        .weightEntry button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 50px;
            cursor: pointer;
            border-radius: 5px;
        }

        .weightEntry button:hover {
            background: #cc0000;
        }

        .csv-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 30px;
            font-size: 40px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }

        .csv-btn:hover {
            background: #38a169;
        }

        .card {
            max-width: 720px;
            margin: 0 auto 20px;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .input-row input[type="text"] {
            flex: 1;
        }

        .input-row input[type="submit"] {
            width: auto;
        }

        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .primary-btn,
        .secondary-btn {
            font-size: 32px;
            padding: 20px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .primary-btn {
            background: #1d4ed8;
            color: white;
        }

        .primary-btn:hover {
            background: #1e40af;
        }

        .secondary-btn {
            background: #f1f5f9;
            color: #0f172a;
        }

        .secondary-btn:hover {
            background: #e2e8f0;
        }
    </style>
</head>

<body>
    <div id="loginContainer" class="card">
        <button id="googleLoginBtn" class="primary-btn">Anmeldung nur für KLubina</button>
        <button id="demoLoginBtn" class="secondary-btn">Demo für Externe</button>
    </div>
    <div id="appContainer" style="display:none;">
        <div class="input-row">
            <input type="text" id="weightInput" placeholder="Gewicht in kg">
            <input type="submit" value="EINGEBEN" onclick="addNewWeight()">
        </div>
        <div id="weightList"></div>
        <div class="actions-row">
            <button onclick="exportToCsv()" class="csv-btn">CSV EXPORT</button>
        </div>
    </div>

    <script>
        // #region Firebase Config
        const weightTrackerFirebaseConfig = {
            apiKey: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            authDomain: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            projectId: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            storageBucket: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            messagingSenderId: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            appId: "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
        };
        firebase.initializeApp(weightTrackerFirebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        // #endregion

        // #region Utils
        const formatDateAsGerman = (date) => date.toLocaleDateString("de-DE");
        const isEmptyString = (value) => !value;
        const extractDateFromISO = (isoString) => isoString.split("T")[0];
        const getCurrentDateAsISO = () => new Date().toISOString().split("T")[0];
        // #endregion

        // #region DOM Helpers
        const getElementById = (id) => document.getElementById(id);
        const weightInput = () => getElementById("weightInput");
        const weightList = () => getElementById("weightList");
        const loginContainer = () => getElementById("loginContainer");
        const appContainer = () => getElementById("appContainer");
        const setDisplayStyle = (element, displayValue) => {
            element.style.display = displayValue;
        };
        function toggleUiState(isLoggedIn) {
            setDisplayStyle(loginContainer(), isLoggedIn ? "none" : "flex");
            setDisplayStyle(appContainer(), isLoggedIn ? "block" : "none");
        }
        // #endregion

        // #region Database Queries 
        const weightsCollection = () => db.collection("weights");
        const allWeightsNewestFirst = () => weightsCollection().orderBy("datum", "desc");
        const weightWithId = (id) => weightsCollection().doc(id);
        // #endregion

        // #region Rendering Logic
        function showAllWeights() {
            return allWeightsNewestFirst().get().then(renderWeightList);
        }
        function renderWeightList(weights) {
            clearWeightList();
            weights.forEach(addWeightEntry);
        }
        function clearWeightList() {
            weightList().innerHTML = "";
        }
        function addWeightEntry(doc) {
            const entry = createWeightEntryElement(doc);
            weightList().appendChild(entry);
        }
        function createWeightEntryElement(doc) {
            const data = doc.data();
            const element = document.createElement("div");
            element.className = "weightEntry";
            const weightContainer = createWeightContainer(doc.id, data);
            const deleteBtn = createDeleteButton(doc.id);
            element.appendChild(weightContainer);
            element.appendChild(deleteBtn);
            return element;
        }
        function createWeightContainer(id, data) {
            const container = document.createElement("div");
            container.className = "weightValue";
            const weightSpan = createWeightSpan(id, data.gewicht);
            const dateSpan = createDateSpan(id, data.datum.toDate());
            container.appendChild(weightSpan);
            container.appendChild(dateSpan);
            return container;
        }
        function createWeightSpan(id, weight) {
            const span = document.createElement("span");
            span.onclick = () => editWeight(id, weight);
            span.textContent = `${weight} kg`;
            return span;
        }
        function createDateSpan(id, date) {
            const span = document.createElement("span");
            span.className = "date";
            span.onclick = () => editDate(id, date.toISOString());
            span.textContent = formatDateAsGerman(date);
            return span;
        }
        function createDeleteButton(id) {
            const button = document.createElement("button");
            button.onclick = () => deleteWeight(id);
            button.textContent = "x";
            return button;
        }
        // #endregion

        // #region CRUD Operations
        function addNewWeight() {
            const weightValue = weightInput().value;
            if (isEmptyString(weightValue)) return;
            weightsCollection()
                .add({ gewicht: weightValue, datum: new Date() })
                .then(() => { weightInput().value = ""; })
                .then(showAllWeights);
        }
        function deleteWeight(id) {
            return weightWithId(id).delete().then(showAllWeights);
        }
        function editWeight(id, currentWeight) {
            const newWeight = prompt("New weight:", currentWeight);
            const weightWasChanged = newWeight && newWeight !== currentWeight;
            if (weightWasChanged) {
                weightWithId(id).update({ gewicht: newWeight }).then(showAllWeights);
            }
        }
        function editDate(id, currentDateISO) {
            const currentDate = extractDateFromISO(currentDateISO);
            const newDate = prompt("New date (YYYY-MM-DD):", currentDate);
            const dateWasChanged = newDate && newDate !== currentDate;
            if (dateWasChanged) {
                weightWithId(id).update({ datum: new Date(newDate) }).then(showAllWeights);
            }
        }
        // #endregion

        // #region CSV Export
        function exportToCsv() {
            return allWeightsNewestFirst()
                .get()
                .then(buildCsvFromWeights)
                .then(downloadCsvFile)
                .catch(showExportError);
        }
        function buildCsvFromWeights(weights) {
            if (weights.empty) return null;
            const header = "Date,Weight";
            const dataRows = weights.docs.map(doc => {
                const data = doc.data();
                const date = formatDateAsGerman(data.datum.toDate());
                return `${date},${data.gewicht}`;
            });
            return [header, ...dataRows].join("\n");
        }
        function downloadCsvFile(csvContent) {
            if (!csvContent) return;
            const filename = `weight-tracker-${getCurrentDateAsISO()}.csv`;
            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const downloadUrl = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = downloadUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(downloadUrl);
        }
        function showExportError(error) {
            console.error("Export error:", error);
            alert("Error exporting data!");
        }
        // #endregion

        // #region Authentication
function handleAuthChanged(user) {
    const isLoggedIn = Boolean(user);
    toggleUiState(isLoggedIn);
    if (isLoggedIn) {
        showAllWeights();
    } else {
        clearWeightList();
    }
}
function loginWithGoogle() {
    return auth.signInWithPopup(googleProvider).catch(error => {
        alert("Login fehlgeschlagen: " + error.message);
    });
}
// #endregion

        // #region Demo Mode
        function startDemoMode() {
            toggleUiState(true);
            const today = new Date();
            const demoWeights = [];
            for (let i = 0; i <= 90; i += 10) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                demoWeights.push({
                    id: `demo${i}`,
                    data: () => ({
                        gewicht: 85.5 + (i / 10) * 0.7,
                        datum: { toDate: () => d },
                    }),
                });
            }
            renderWeightList(demoWeights);
        }
        // #endregion

// #region Event Listeners & Startup
getElementById("weightInput").addEventListener("keypress", (event) => {
    if (event.key === "Enter") addNewWeight();
});
getElementById("googleLoginBtn").addEventListener("click", loginWithGoogle);
getElementById("demoLoginBtn").addEventListener("click", startDemoMode);
auth.onAuthStateChanged(handleAuthChanged);
        // #endregion

    </script>
</body>

</html>
